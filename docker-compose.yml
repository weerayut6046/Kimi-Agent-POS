services:
  app:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      APP_ID: ${APP_ID:-pos-app}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-/data/pos.db}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - db_data:/data

volumes:
  db_data:
