services:
  app:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      APP_ID: ${APP_ID:-pos-app}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:?กรุณาตั้งค่า Supabase DATABASE_URL ในไฟล์ .env}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-180000}
      SEED_ON_START: ${SEED_ON_START:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-3000}:3000"
