services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-pos}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ID: ${APP_ID:-pos-app}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-rootpass}@db:3306/${DB_NAME:-pos}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
